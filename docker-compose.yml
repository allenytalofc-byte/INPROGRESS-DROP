version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dropship_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dropship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dropship}
      POSTGRES_DB: ${POSTGRES_DB:-dropship}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dropship}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: dropship_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dropship}:${POSTGRES_PASSWORD:-dropship}@postgres:5432/${POSTGRES_DB:-dropship}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3001:3000"

  worker:
    build:
      context: ./services/workers
      dockerfile: Dockerfile
    container_name: dropship_worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dropship}:${POSTGRES_PASSWORD:-dropship}@postgres:5432/${POSTGRES_DB:-dropship}

volumes:
  db_data: