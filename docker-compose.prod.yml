version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dropshipping-postgres-prod
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    networks:
      - dropshipping-network-prod
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dropshipping-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - dropshipping-network-prod
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: dropshipping-api-prod
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - API_PORT=3002
      - CORS_ORIGIN=${CORS_ORIGIN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    networks:
      - dropshipping-network-prod
    restart: unless-stopped
    command: npm run start:prod

  workers:
    build:
      context: ./services/workers
      dockerfile: Dockerfile
    container_name: dropshipping-workers-prod
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
    depends_on:
      - postgres
    networks:
      - dropshipping-network-prod
    restart: unless-stopped
    command: npm start

  nginx:
    image: nginx:alpine
    container_name: dropshipping-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - dropshipping-network-prod
    restart: unless-stopped

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  dropshipping-network-prod:
    driver: bridge